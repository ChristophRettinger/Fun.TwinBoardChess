<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twin Board Chess</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    [hidden] { display: none !important; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem;
      background: #1e1e2e;
      font-family: system-ui, sans-serif;
      color: #cdd6f4;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .controls label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .controls select {
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #44415a;
      border-radius: 4px;
      padding: 0.3rem 0.5rem;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .controls select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #skill-slider {
      accent-color: #89b4fa;
      width: 80px;
      cursor: pointer;
      vertical-align: middle;
    }
    #skill-slider:disabled { opacity: 0.5; cursor: not-allowed; }
    #skill-value { min-width: 1ch; font-variant-numeric: tabular-nums; }
    #loading-msg { font-size: 0.875rem; color: #a6adc8; }
    .controls button {
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 4px;
      padding: 0.35rem 0.9rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    .controls button:hover { background: #74c7ec; }
    #new-game-btn {
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #44415a;
    }
    #new-game-btn:hover { background: #45475a; }
    #move-counter {
      font-size: 0.875rem;
      font-weight: 500;
      color: #a6adc8;
    }
    .boards {
      display: flex;
      gap: 3rem;
    }
    .panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      transition: opacity 0.3s;
    }
    .panel.frozen { opacity: 0.45; }
    h2 {
      margin: 0;
      color: #cdd6f4;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(8, 64px);
      grid-template-rows: repeat(8, 64px);
      border: 3px solid #44415a;
    }
    .sq {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 46px;
      line-height: 1;
    }
    .sq.light    { background: #f0d9b5; }
    .sq.dark     { background: #b58863; }
    .sq.selected { background: #f6f669 !important; }
    .sq.interactive { cursor: pointer; }
    .sq.target      { cursor: pointer; }
    .sq.target::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 30%; height: 30%;
      background: rgba(0,0,0,0.22);
      border-radius: 50%;
      pointer-events: none;
    }
    .sq.target.occupied::after {
      width: 90%; height: 90%;
      background: transparent;
      border: 6px solid rgba(0,0,0,0.22);
    }
    .wp { color: #fff; text-shadow: 0 0 2px #333, 0 0 4px #333; }
    .bp { color: #1a1a1a; }
    .sq img { width: 90%; height: 90%; pointer-events: none; display: block; }
    .sq.origin::before {
      content: '';
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 10px;
      height: 10px;
      background: #3a7d4a;
      border-radius: 50%;
      pointer-events: none;
    }

    .sq.last-move { background-color: rgba(205, 210, 106, 0.55); }

    /* Banners */
    #banner-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .banner {
      background: #313244;
      border: 2px solid #44415a;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      max-width: 380px;
    }
    .banner h2 {
      font-size: 1.5rem;
      letter-spacing: 0;
      text-transform: none;
      margin: 0;
    }
    .banner p {
      margin: 0;
      color: #a6adc8;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .banner-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }
    .banner-actions button {
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    #banner-continue { background: #89b4fa; color: #1e1e2e; }
    #banner-continue:hover { background: #74c7ec; }
    #banner-new-game-overlay { background: #45475a; color: #cdd6f4; }
    #banner-new-game-overlay:hover { background: #585b70; }
    .banner.win     h2 { color: #a6e3a1; }
    .banner.partial h2 { color: #fab387; }
    .banner.loss    h2 { color: #f38ba8; }

    /* ── Portrait: stack boards ──────────────────────────── */
    @media (orientation: portrait) {
      body { padding: 1rem; }
      .boards { flex-direction: column; gap: 1.5rem; }
      .board {
        --sq: min(64px, calc((100vw - 2rem - 6px) / 8));
        grid-template-columns: repeat(8, var(--sq));
        grid-template-rows: repeat(8, var(--sq));
      }
      .sq { width: var(--sq); height: var(--sq); font-size: calc(var(--sq) * 0.72); }
      .controls { width: 100%; }
      .banner { max-width: calc(100vw - 2rem); padding: 1.5rem; }
    }

    /* ── Landscape phones: side-by-side, scaled ─────────── */
    @media (orientation: landscape) and (max-height: 500px) {
      body { padding: 0.5rem; gap: 0.5rem; }
      .boards { gap: 1rem; }
      .board {
        --sq: min(64px, min(calc((100vh - 4rem) / 8), calc((100vw - 3rem) / 16)));
        grid-template-columns: repeat(8, var(--sq));
        grid-template-rows: repeat(8, var(--sq));
      }
      .sq { width: var(--sq); height: var(--sq); font-size: calc(var(--sq) * 0.72); }
      .controls { gap: 0.5rem; }
      .controls label, .controls button, .controls select,
      #move-counter, #loading-msg { font-size: 0.75rem; }
      .controls button { padding: 0.2rem 0.6rem; }
      #skill-slider { width: 60px; }
      h2 { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="controls">
    <label>Bot: <select id="bot-type">
      <option value="random">Random</option>
      <option value="stockfish">Stockfish</option>
    </select></label>
    <label id="skill-label" hidden>Skill:
      <input type="range" id="skill-slider" min="0" max="5" value="3" step="1">
      <span id="skill-value">3</span>
    </label>
    <label>Pieces: <select id="piece-set">
      <option value="cburnett">Classic (cburnett)</option>
      <option value="staunty">Staunty</option>
      <option value="merida">Merida</option>
      <option value="unicode">Unicode ♟</option>
    </select></label>
    <label>Play as: <select id="player-color">
      <option value="w">White</option>
      <option value="b">Black</option>
    </select></label>
    <button id="start-btn">Start Game</button>
    <button id="new-game-btn">New Game</button>
    <span id="move-counter" hidden>Move: 0</span>
    <label id="highlight-label" hidden><input type="checkbox" id="highlight-toggle"> Highlights</label>
    <span id="loading-msg" hidden>Loading Stockfish…</span>
  </div>

  <div class="boards">
    <div class="panel" id="panel1">
      <h2 id="label1">Board 1 — You play</h2>
      <div id="board1" class="board"></div>
    </div>
    <div class="panel" id="panel2">
      <h2 id="label2">Board 2</h2>
      <div id="board2" class="board"></div>
    </div>
  </div>

  <div id="banner-overlay" hidden>
    <div id="banner" class="banner">
      <h2 id="banner-title"></h2>
      <p id="banner-msg"></p>
      <div class="banner-actions">
        <button id="banner-continue" hidden>Continue</button>
        <button id="banner-new-game-overlay">New Game</button>
      </div>
    </div>
  </div>

  <script type="module">
    import {Chess} from 'https://cdn.jsdelivr.net/npm/chess.js@1/+esm'

    const STOCKFISH_JS   = 'https://cdn.jsdelivr.net/npm/stockfish@16/src/stockfish-nnue-16-single.js'
    const STOCKFISH_WASM = 'https://cdn.jsdelivr.net/npm/stockfish@16/src/stockfish-nnue-16-single.wasm'

    class RandomBot {
      async getMove(game) {
        const ms = game.moves({verbose: true})
        return ms.length ? ms[Math.floor(Math.random() * ms.length)] : null
      }
      destroy() {}
    }

    class StockfishBot {
      constructor(skillLevel) {
        this.skillLevel = skillLevel
        this.worker = null
        this.pendingResolve = null
      }

      init() {
        return new Promise((resolve, reject) => {
          // Intercept fetch so the relative WASM URL gets replaced with the full CDN URL.
          // Stockfish's browser-worker init derives the WASM path from self.location.hash,
          // which is empty in a Blob worker, leaving only the filename as the fetch target.
          const workerSrc = [
            `const _f=self.fetch.bind(self);`,
            `self.fetch=(u,...r)=>{if(typeof u==='string'&&u.includes('.wasm')&&!u.startsWith('http')){u='${STOCKFISH_WASM}'}return _f(u,...r)};`,
            `importScripts('${STOCKFISH_JS}');`,
          ].join('')
          const blob = new Blob([workerSrc], {type: 'text/javascript'})
          const blobUrl = URL.createObjectURL(blob)
          this.worker = new Worker(blobUrl)
          URL.revokeObjectURL(blobUrl)

          this.worker.onerror = reject
          this.worker.onmessage = ({data}) => {
            if (data === 'uciok') {
              this.worker.postMessage(`setoption name Skill Level value ${this.skillLevel}`)
              this.worker.postMessage('isready')
            } else if (data === 'readyok') {
              this.worker.onmessage = ({data}) => {
                if (typeof data === 'string' && data.startsWith('bestmove ')) {
                  const lan = data.split(' ')[1]
                  if (this.pendingResolve) {
                    const r = this.pendingResolve
                    this.pendingResolve = null
                    r(lan)
                  }
                }
              }
              resolve()
            }
          }
          this.worker.postMessage('uci')
        })
      }

      async getMove(fen) {
        this.worker.postMessage(`position fen ${fen}`)
        this.worker.postMessage('go movetime 500')
        const lan = await new Promise(r => { this.pendingResolve = r })
        if (!lan || lan === '(none)') return null
        const from = lan.slice(0, 2)
        const to   = lan.slice(2, 4)
        const promo = lan.length === 5 ? lan[4] : undefined
        return promo ? {from, to, promotion: promo} : {from, to}
      }

      destroy() {
        if (this.worker) { this.worker.terminate(); this.worker = null }
      }
    }

    const GLYPHS = {
      wk:'♔', wq:'♕', wr:'♖', wb:'♗', wn:'♘', wp:'♙',
      bk:'♚', bq:'♛', br:'♜', bb:'♝', bn:'♞', bp:'♟',
    }
    const FILES = ['a','b','c','d','e','f','g','h']

    const game1 = new Chess()
    const game2 = new Chess()
    let selected = null
    let targets = []
    let inputEnabled = false
    let isGameStarted = false
    let playerColor = 'w'
    let moveCount = 0
    let bot = null
    // 'pre' | 'playing' | 'partial' | 'won' | 'lost'
    let gamePhase = 'pre'
    // which board is still active after partial victory (1 or 2)
    let partialSurvivingBoard = null
    let highlightToggle = false
    let pieceSet = 'cburnett'
    let lastMove1 = null
    let lastMove2 = null

    const botTypeEl     = document.getElementById('bot-type')
    const skillLabelEl  = document.getElementById('skill-label')
    const skillSliderEl = document.getElementById('skill-slider')
    const skillValueEl  = document.getElementById('skill-value')
    const playerColorEl = document.getElementById('player-color')
    const startBtn      = document.getElementById('start-btn')
    const newGameBtn    = document.getElementById('new-game-btn')
    const moveCounterEl = document.getElementById('move-counter')
    const loadingMsgEl      = document.getElementById('loading-msg')
    const highlightLabelEl  = document.getElementById('highlight-label')
    const highlightToggleEl = document.getElementById('highlight-toggle')
    const pieceSetEl        = document.getElementById('piece-set')

    function sqLight(fi, rank) {
      return (fi + rank) % 2 === 0
    }

    function renderBoard(id, game, interactive, highlights = [], lastMove = null) {
      const el = document.getElementById(id)
      el.innerHTML = ''
      const flipped = isGameStarted && playerColor === 'b'
      const ranks = flipped ? [1,2,3,4,5,6,7,8] : [8,7,6,5,4,3,2,1]
      const fileIndices = flipped ? [7,6,5,4,3,2,1,0] : [0,1,2,3,4,5,6,7]

      for (const rank of ranks) {
        for (const fi of fileIndices) {
          const sq = FILES[fi] + rank
          const piece = game.get(sq)
          const div = document.createElement('div')
          div.className = 'sq ' + (sqLight(fi, rank) ? 'light' : 'dark')
          div.dataset.sq = sq

          if (piece) {
            if (pieceSet === 'unicode') {
              div.textContent = GLYPHS[piece.color + piece.type]
              div.classList.add(piece.color === 'w' ? 'wp' : 'bp')
            } else {
              const img = document.createElement('img')
              img.src = `https://lichess1.org/assets/piece/${pieceSet}/${piece.color}${piece.type.toUpperCase()}.svg`
              img.alt = ''
              img.draggable = false
              div.appendChild(img)
            }
          }

          if (highlights.includes(sq)) div.classList.add('origin')
          if (lastMove && (sq === lastMove.from || sq === lastMove.to)) div.classList.add('last-move')

          if (interactive) {
            if (sq === selected) div.classList.add('selected')
            if (targets.includes(sq)) {
              div.classList.add('target')
              if (piece) div.classList.add('occupied')
            }
            if (inputEnabled && piece?.color === playerColor && game.turn() === playerColor) {
              div.classList.add('interactive')
            }
          }

          el.appendChild(div)
        }
      }
    }

    function render() {
      const panel1 = document.getElementById('panel1')
      const panel2 = document.getElementById('panel2')
      const label1 = document.getElementById('label1')
      const label2 = document.getElementById('label2')
      const highlights = getHighlightSquares()

      panel1.classList.remove('frozen')
      panel2.classList.remove('frozen')

      if (gamePhase === 'partial') {
        if (partialSurvivingBoard === 1) {
          label1.textContent = 'Board 1 — Active'
          label2.textContent = 'Board 2 — Won'
          panel2.classList.add('frozen')
          renderBoard('board1', game1, true,  highlights, lastMove1)
          renderBoard('board2', game2, false, [],         lastMove2)
        } else {
          label1.textContent = 'Board 1 — Won'
          label2.textContent = 'Board 2 — Active'
          panel1.classList.add('frozen')
          renderBoard('board1', game1, false, [],         lastMove1)
          renderBoard('board2', game2, true,  highlights, lastMove2)
        }
      } else {
        label1.textContent = isGameStarted ? 'Board 1 — You play' : 'Board 1'
        label2.textContent = 'Board 2'
        renderBoard('board1', game1, true,  highlights, lastMove1)
        renderBoard('board2', game2, false, [],         lastMove2)
      }
    }

    function intersect(square) {
      const t2 = new Set(game2.moves({square, verbose: true}).map(m => m.to))
      return game1.moves({square, verbose: true}).map(m => m.to).filter(sq => t2.has(sq))
    }

    // True if there is at least one player move whose destination exists on both boards.
    function hasAnyIntersectionMove() {
      const moves = game1.moves({verbose: true})
      const froms = [...new Set(moves.map(m => m.from))]
      return froms.some(sq => intersect(sq).length > 0)
    }

    function getHighlightSquares() {
      if (!highlightToggle) return []
      if (gamePhase === 'playing') {
        const froms = [...new Set(game1.moves({verbose: true}).map(m => m.from))]
        return froms.filter(sq => intersect(sq).length > 0)
      }
      if (gamePhase === 'partial') {
        const sg = partialSurvivingBoard === 1 ? game1 : game2
        return [...new Set(sg.moves({verbose: true}).map(m => m.from))]
      }
      return []
    }

    function showBanner(type, wonBoard) {
      const overlay = document.getElementById('banner-overlay')
      const banner  = document.getElementById('banner')
      const title   = document.getElementById('banner-title')
      const msg     = document.getElementById('banner-msg')
      const contBtn = document.getElementById('banner-continue')

      overlay.hidden = false
      banner.className = 'banner'

      if (type === 'full-win') {
        banner.classList.add('win')
        title.textContent = 'Victory!'
        msg.textContent = 'You checkmated the bot on both boards!'
        contBtn.hidden = true
      } else if (type === 'partial') {
        const survBoard = wonBoard === 1 ? 2 : 1
        banner.classList.add('partial')
        title.textContent = 'Board Conquered!'
        msg.textContent = `Board ${wonBoard} is won! Board ${survBoard} continues — intersection constraint removed.`
        contBtn.hidden = false
      } else {
        banner.classList.add('loss')
        title.textContent = 'Game Over'
        msg.textContent = 'No legal moves remaining.'
        contBtn.hidden = true
      }
    }

    function hideBanner() {
      document.getElementById('banner-overlay').hidden = true
    }

    // Called after player's move. It is now the bot's turn.
    // Checkmate = bot is mated = player wins that board.
    // Stalemate = loss (per game rules).
    function checkAfterPlayerMove() {
      if (gamePhase === 'partial') {
        const sg = partialSurvivingBoard === 1 ? game1 : game2
        if (sg.isCheckmate()) {
          gamePhase = 'won'
          inputEnabled = false
          render()
          showBanner('full-win')
          return true
        }
        if (sg.isStalemate()) {
          gamePhase = 'lost'
          inputEnabled = false
          render()
          showBanner('loss')
          return true
        }
        return false
      }

      const g1cm = game1.isCheckmate()
      const g2cm = game2.isCheckmate()

      if (g1cm && g2cm) {
        gamePhase = 'won'
        inputEnabled = false
        render()
        showBanner('full-win')
        return true
      }
      if (g1cm) {
        gamePhase = 'partial'
        partialSurvivingBoard = 2
        render()
        showBanner('partial', 1)
        return true
      }
      if (g2cm) {
        gamePhase = 'partial'
        partialSurvivingBoard = 1
        render()
        showBanner('partial', 2)
        return true
      }
      if (game1.isStalemate() || game2.isStalemate()) {
        gamePhase = 'lost'
        inputEnabled = false
        render()
        showBanner('loss')
        return true
      }
      return false
    }

    // Called after the bot's move. It is now the player's turn.
    // Checkmate/stalemate = player has no moves = loss.
    // Empty intersection = loss.
    function checkAfterBotMove() {
      if (gamePhase === 'partial') {
        const sg = partialSurvivingBoard === 1 ? game1 : game2
        if (sg.isCheckmate() || sg.isStalemate()) {
          gamePhase = 'lost'
          inputEnabled = false
          render()
          showBanner('loss')
          return true
        }
        return false
      }

      if (game1.isCheckmate() || game1.isStalemate() ||
          game2.isCheckmate() || game2.isStalemate()) {
        gamePhase = 'lost'
        inputEnabled = false
        render()
        showBanner('loss')
        return true
      }
      if (!hasAnyIntersectionMove()) {
        gamePhase = 'lost'
        inputEnabled = false
        render()
        showBanner('loss')
        return true
      }
      return false
    }

    async function botPickMove(game) {
      if (bot instanceof StockfishBot) return bot.getMove(game.fen())
      const ms = game.moves({verbose: true})
      return ms.length ? ms[Math.floor(Math.random() * ms.length)] : null
    }

    async function botMove() {
      if (gamePhase === 'partial') {
        const sg = partialSurvivingBoard === 1 ? game1 : game2
        const m = await botPickMove(sg)
        if (m) {
          sg.move(m)
          if (partialSurvivingBoard === 1) lastMove1 = { from: m.from, to: m.to }
          else                             lastMove2 = { from: m.from, to: m.to }
        }
      } else {
        const m1 = await botPickMove(game1)
        if (m1) { game1.move(m1); lastMove1 = { from: m1.from, to: m1.to } }
        const m2 = await botPickMove(game2)
        if (m2) { game2.move(m2); lastMove2 = { from: m2.from, to: m2.to } }
      }

      if (checkAfterBotMove()) return
      inputEnabled = true
      render()
    }

    async function startGame() {
      playerColor = playerColorEl.value
      botTypeEl.disabled = true
      skillSliderEl.disabled = true
      playerColorEl.disabled = true
      startBtn.hidden = true

      if (botTypeEl.value === 'stockfish') {
        bot = new StockfishBot(parseInt(skillSliderEl.value, 10))
        loadingMsgEl.hidden = false
        try {
          await bot.init()
        } catch (err) {
          bot.destroy()
          bot = null
          loadingMsgEl.hidden = true
          botTypeEl.disabled = false
          skillSliderEl.disabled = false
          playerColorEl.disabled = false
          startBtn.hidden = false
          alert('Failed to load Stockfish. Check your internet connection and try again.')
          return
        }
        loadingMsgEl.hidden = true
      } else {
        bot = new RandomBot()
      }

      isGameStarted = true
      moveCount = 0
      gamePhase = 'playing'
      moveCounterEl.hidden = false
      moveCounterEl.textContent = 'Move: 0'
      highlightLabelEl.hidden = false

      if (playerColor === 'b') {
        inputEnabled = false
        render()
        setTimeout(botMove, 400)
      } else {
        inputEnabled = true
        render()
      }
    }

    function newGame() {
      if (bot) { bot.destroy(); bot = null }

      game1.reset()
      game2.reset()
      selected = null
      targets = []
      inputEnabled = false
      isGameStarted = false
      moveCount = 0
      gamePhase = 'pre'
      partialSurvivingBoard = null
      lastMove1 = null
      lastMove2 = null
      hideBanner()

      botTypeEl.disabled = false
      skillSliderEl.disabled = false
      playerColorEl.disabled = false
      startBtn.hidden = false
      moveCounterEl.hidden = true
      loadingMsgEl.hidden = true
      highlightLabelEl.hidden = true
      highlightToggle = false
      highlightToggleEl.checked = false

      render()
    }

    function handleBoardClick(boardNum, e) {
      if (!isGameStarted || !inputEnabled) return
      if (gamePhase === 'playing' && boardNum !== 1) return
      if (gamePhase === 'partial' && boardNum !== partialSurvivingBoard) return
      if (gamePhase !== 'playing' && gamePhase !== 'partial') return

      const div = e.target.closest('[data-sq]')
      if (!div) return
      const sq = div.dataset.sq
      const activeGame = boardNum === 1 ? game1 : game2

      if (targets.includes(sq)) {
        const wasPlaying = gamePhase === 'playing'

        activeGame.move({from: selected, to: sq, promotion: 'q'})
        if (wasPlaying) {
          const otherGame = boardNum === 1 ? game2 : game1
          otherGame.move({from: selected, to: sq, promotion: 'q'})
        }

        selected = null
        targets = []
        inputEnabled = false
        moveCount++
        moveCounterEl.textContent = 'Move: ' + moveCount

        const ended = checkAfterPlayerMove()

        if (!ended) {
          // Normal continuation: no end state, schedule bot move
          render()
          setTimeout(botMove, 400)
        } else if (gamePhase === 'partial' && wasPlaying) {
          // Just entered partial mode: bot will move after player clicks Continue
          // render() already called inside checkAfterPlayerMove
        }
        // else: terminal state (win/loss) — render already called
        return
      }

      const piece = activeGame.get(sq)
      if (piece && piece.color === playerColor && activeGame.turn() === playerColor) {
        selected = sq
        targets = gamePhase === 'partial'
          ? activeGame.moves({square: sq, verbose: true}).map(m => m.to)
          : intersect(sq)
      } else {
        selected = null
        targets = []
      }
      render()
    }

    botTypeEl.addEventListener('change', () => {
      skillLabelEl.hidden = botTypeEl.value !== 'stockfish'
    })
    skillSliderEl.addEventListener('input', () => {
      skillValueEl.textContent = skillSliderEl.value
    })
    highlightToggleEl.addEventListener('change', () => {
      highlightToggle = highlightToggleEl.checked
      render()
    })
    pieceSetEl.addEventListener('change', () => {
      pieceSet = pieceSetEl.value
      render()
    })

    document.getElementById('board1').addEventListener('click', e => handleBoardClick(1, e))
    document.getElementById('board2').addEventListener('click', e => handleBoardClick(2, e))

    startBtn.addEventListener('click', startGame)
    newGameBtn.addEventListener('click', newGame)

    document.getElementById('banner-continue').addEventListener('click', () => {
      hideBanner()
      setTimeout(botMove, 400)
    })
    document.getElementById('banner-new-game-overlay').addEventListener('click', () => {
      hideBanner()
      newGame()
    })

    render()
  </script>
</body>
</html>
